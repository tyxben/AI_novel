colors:
  primary: "#4A90E2"
  secondary: "#5DADE2"
  accent: "#7ED321"
  background: "#FFFFFF"
  text_primary: "#2C3E50"
  text_secondary: "#7F8C8D"
  highlight: "#F39C12"

fonts:
