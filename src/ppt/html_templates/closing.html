<section class="slide" data-page="{{ page_number }}">
    <div style="
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        text-align: center;
        padding: {{ design.padding.left|default(80) }}px;
        box-sizing: border-box;
        background: {{ design.colors.background }};
        position: relative;
    ">
        {# Top accent bar #}
        <div style="
            position: absolute; top: 0; left: 0;
            width: 100%; height: 6px;
            background: linear-gradient(90deg, {{ design.colors.primary }}, {{ design.colors.accent }});
        "></div>

        <h1 style="
            font-family: '{{ design.title_font.family }}', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: {{ design.title_font.size }}pt;
            font-weight: {% if design.title_font.bold %}bold{% else %}normal{% endif %};
            color: {{ design.title_font.color }};
            margin: 0 0 20px 0;
            line-height: 1.3;
        ">{{ content.title }}</h1>

        {% if content.subtitle %}
        <p style="
            font-family: '{{ design.body_font.family }}', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: {{ design.body_font.size }}pt;
            color: {{ design.colors.text }};
            margin: 0 0 30px 0;
            opacity: 0.8;
        ">{{ content.subtitle }}</p>
        {% endif %}

        {# Divider #}
        <div style="
            width: 80px; height: 2px;
            background: {{ design.colors.accent }};
            margin-bottom: 30px;
        "></div>

        {% if content.contact_info %}
        <p style="
            font-family: '{{ design.body_font.family }}', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: {{ (design.body_font.size * 0.9)|int }}pt;
            color: {{ design.colors.secondary }};
            margin: 0;
            line-height: 1.8;
        ">{{ content.contact_info }}</p>
        {% endif %}

        {% if theme and theme.footer_text %}
        <p style="
            position: absolute;
            bottom: 30px;
            font-family: '{{ design.body_font.family }}', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 11pt;
            color: {{ design.colors.text }};
            opacity: 0.5;
            margin: 0;
        ">{{ theme.footer_text }}</p>
        {% endif %}
    </div>
</section>
