<section class="slide" data-page="{{ page_number }}">
    <div style="
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        background: {{ design.colors.background }};
        padding: {{ design.padding.top|default(60) }}px {{ design.padding.left|default(80) }}px {{ design.padding.bottom|default(60) }}px;
        box-sizing: border-box;
    ">
        {# Title area #}
        <h2 style="
            font-family: '{{ design.title_font.family }}', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: {{ design.title_font.size }}pt;
            font-weight: {% if design.title_font.bold %}bold{% else %}normal{% endif %};
            color: {{ design.title_font.color }};
            margin: 0 0 40px 0;
            text-align: center;
        ">{{ content.title }}</h2>

        {# Three columns #}
        <div style="
            display: flex; flex-direction: row;
            flex: 1; gap: 40px;
            align-items: flex-start;
        ">
            {% for col in content.columns %}
            <div style="
                flex: 1;
                text-align: center;
                padding: 30px 20px;
                background: {{ design.colors.primary }}08;
                border-radius: 12px;
                border-top: 3px solid {{ design.colors.primary }};
            ">
                <h3 style="
                    font-family: '{{ design.title_font.family }}', 'PingFang SC', 'Microsoft YaHei', sans-serif;
                    font-size: {{ (design.body_font.size * 1.1)|int }}pt;
                    font-weight: bold;
                    color: {{ design.colors.primary }};
                    margin: 0 0 16px 0;
                ">{{ col.subtitle }}</h3>
                <p style="
                    font-family: '{{ design.body_font.family }}', 'PingFang SC', 'Microsoft YaHei', sans-serif;
                    font-size: {{ design.body_font.size }}pt;
                    color: {{ design.body_font.color }};
                    margin: 0;
                    line-height: 1.6;
                ">{{ col.description }}</p>
            </div>
            {% endfor %}

            {# Fill empty columns if fewer than 3 #}
            {% for _ in range(3 - content.columns|length) %}
            <div style="flex: 1;"></div>
            {% endfor %}
        </div>
    </div>
</section>
