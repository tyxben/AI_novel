narrative_id: pitch_deck
name: 融资路演
description: 适用于向投资人展示项目愿景、市场机会和商业模式，争取投资
target_pages_min: 12
target_pages_max: 18
structure:
  - role: cover
    title_template: "{{company_name}} — {{slogan}}"
    required: true
  - role: pain_point
    title_template: "市场痛点"
    key_points_count: "2-3"
    required: true
  - role: market_opportunity
    title_template: "市场机会"
    key_points_count: "3-4"
    required: true
  - role: solution
    title_template: "我们的方案"
    key_points_count: "2-3"
    required: true
  - role: product_overview
    title_template: "产品概览"
    key_points_count: "3-5"
    required: true
  - role: core_features
    title_template: "核心能力"
    key_points_count: "3-4"
    required: true
  - role: competitive_advantage
    title_template: "竞争壁垒"
    key_points_count: "3-4"
    required: true
  - role: business_model
    title_template: "商业模式"
    key_points_count: "3-4"
    required: true
  - role: case_data
    title_template: "关键数据与里程碑"
    key_points_count: "3-5"
    required: true
  - role: cta
    title_template: "融资计划"
    key_points_count: "3-4"
    required: true
  - role: closing
    title_template: "联系我们"
    required: true
narrative_tips:
  - "30秒法则：cover + pain_point 必须在前两页抓住投资人注意力"
  - "数据说话：market_opportunity 和 case_data 必须有具体数字（TAM/SAM/SOM、增长率、用户量）"
  - "壁垒清晰：competitive_advantage 说明为什么别人做不了或追不上"
  - "融资明确：cta 页必须包含融资金额、用途分配和预期里程碑"
