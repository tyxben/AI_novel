narrative_id: workshop
name: 工作坊
description: 适用于互动式培训或工作坊，强调参与者动手实践和分组讨论
target_pages_min: 15
target_pages_max: 25
structure:
  - role: cover
    title_template: "{{workshop_name}} 工作坊"
    required: true
  - role: learning_objectives
    title_template: "今日目标"
    key_points_count: "3-4"
    required: true
  - role: background
    title_template: "破冰与背景"
    key_points_count: "2-3"
    required: true
  - role: concept_intro
    title_template: "核心方法论"
    key_points_count: "3-5"
    required: true
  - role: method_steps
    title_template: "操作指南"
    key_points_count: "4-6"
    required: true
  - role: exercise
    title_template: "实践环节（一）"
    key_points_count: "3-4"
    required: true
  - role: exercise
    title_template: "实践环节（二）"
    key_points_count: "3-4"
    required: true
  - role: example_case
    title_template: "优秀案例展示"
    key_points_count: "3-4"
    required: false
  - role: summary_review
    title_template: "总结与分享"
    key_points_count: "3-5"
    required: true
  - role: closing
    title_template: "后续资源与反馈"
    required: true
narrative_tips:
  - "互动优先：每 15-20 分钟插入一次互动环节（提问、讨论或练习）"
  - "练习具体：exercise 页必须有明确的操作步骤和预期产出"
  - "时间管控：每页标注建议时长，总时长不超过工作坊预定时间"
  - "成果导向：参与者离开时必须带走一个可复用的模板或工具"
