# AI 小说推文自动化 - 全局配置

# 全局 LLM 配置（分段和 Prompt 生成共用，可被模块级配置覆盖）
llm:
  provider: auto  # auto | openai | deepseek | gemini | ollama
  # model: gpt-4o-mini          # openai 默认
  # model: deepseek-chat         # deepseek 默认
  # model: gemini-2.0-flash-lite # gemini 默认
  # model: qwen2.5:7b            # ollama 默认

# 项目设置
project:
  default_workspace: workspace
  default_output: output

# 文本分段
segmenter:
  method: simple  # simple | llm
  max_chars: 100
  min_chars: 20
  llm:
    model: gpt-4o-mini
    temperature: 0.3

# Prompt 生成
promptgen:
  style: anime  # 风格预设名
  llm:
    model: gpt-4o-mini
    temperature: 0.7
  character_tracking: true

# AI 视频片段生成（可选，不配置则使用静态图+Ken Burns模式）
# videogen:
#   backend: kling        # kling | seedance | minimax | sora
#   duration: 5           # 视频时长（秒）
#   aspect_ratio: "9:16"  # 竖屏
#   mode: std             # std | pro (仅kling)
#   use_image_as_first_frame: true  # 用图片生成的结果作为视频首帧
#   poll_interval: 10     # 轮询间隔（秒）
#   poll_timeout: 300     # 轮询超时（秒）
#   # --- 可灵 Kling (backend: kling) ---
#   # model: kling-v2-6
#   # --- 即梦 Seedance (backend: seedance) ---
#   # model: seedance-2.0
#   # resolution: 1080p
#   # --- MiniMax 海螺 (backend: minimax) ---
#   # model: MiniMax-Hailuo-02
#   # resolution: 720P
#   # --- OpenAI Sora (backend: sora) ---
#   # model: sora-2          # sora-2 | sora-2-pro
#   # size: 1024x1792        # 竖屏 9:16
#   # 使用 OPENAI_API_KEY

# 图片生成
imagegen:
  backend: siliconflow  # diffusers | together | siliconflow | dashscope
  model: black-forest-labs/FLUX.1-schnell
  width: 1024
  height: 1792
  # --- Diffusers 本地 (backend: diffusers) ---
  # model: gsdf/Counterfeit-V2.5
  # width: 512
  # height: 896
  # steps: 30
  # guidance_scale: 7.5
  # device: auto  # auto | cuda | mps | cpu
  # --- Together.ai (backend: together) ---
  # model: black-forest-labs/FLUX.1-schnell-Free
  # steps: 4
  # --- SiliconFlow 硅基流动 (backend: siliconflow) ---
  # model: black-forest-labs/FLUX.1-schnell  # 免费
  # image_size: 1024x1792  # 可选，默认用 width x height
  # --- 阿里云万相 (backend: dashscope) ---
  # model: wan2.6-t2i  # 新用户 100 张免费
  # size: 1024*1792

# TTS 配音
tts:
  voice: zh-CN-YunxiNeural
  rate: "+0%"
  volume: "+0%"

# 字幕
subtitle:
  font_size: 48
  font_color: white
  outline_color: black
  outline_width: 2
  position: bottom  # bottom | center

# 视频合成
video:
  resolution: [1080, 1920]  # 竖屏 9:16
  fps: 30
  codec: libx265  # libx264(通用) | libx265(推荐,体积小一半) | libsvtav1(最小,兼容性差)
  crf: 18
  ken_burns:
    zoom_range: [1.0, 1.15]
    pan_speed: 0.02
  transition:
    type: crossfade
    duration: 0.5
  bgm:
    path: ""  # 留空则无BGM
    volume: 0.15
